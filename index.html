<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blomklassificerare</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

<style>
body{
font-family:Arial, sans-serif;
background:#f5f0e8;
display:flex;
flex-direction:column;
align-items:center;
padding:40px
}

#drop-area{
border:2px dashed #999;
padding:40px;
width:400px;
text-align:center;
cursor:pointer;
margin-bottom:20px
}

#preview-img{
max-width:100%;
display:none
}

#result-card{
max-width:500px;
opacity:0;
transition:0.4s
}

#result-card.visible{
opacity:1
}

.bar-track{
height:6px;
background:#ddd;
margin-top:10px
}

.bar-fill{
height:100%;
width:0%;
background:#7a8c6e;
transition:width 0.7s
}

.pred-row{
display:flex;
justify-content:space-between;
margin-top:6px
}

.pred-track{
flex:1;
margin:0 10px;
background:#eee;
height:4px
}

.pred-bar{
height:100%;
width:0%
}
</style>
</head>

<body>

<h1>Blomigenkänning</h1>

<div id="drop-area">
<input type="file" id="file-input" accept="image/*">
<img id="preview-img">
<p>Dra & släpp eller klicka</p>
</div>

<div id="result-card">
<div id="result-inner" class="result-inner">

<h2 id="flower-name">—</h2>
<p id="confidence-line"></p>

<div class="bar-track">
<div id="main-bar" class="bar-fill"></div>
</div>

<div id="all-predictions"></div>

</div>
</div>

<script>

const CLASS_NAMES = [
'Daisy',
'Dandelion',
'Roses',
'Sunflowers',
'Tulips'
]

const MODEL_PATH = 'tfjs_model/model.json'
const IMG_SIZE = 224

const THRESHOLD_SURE = 0.75
const THRESHOLD_UNCERTAIN = 0.50

const fileInput = document.getElementById('file-input')
const dropArea = document.getElementById('drop-area')
const previewImg = document.getElementById('preview-img')

const resultCard = document.getElementById('result-card')
const resultInner = document.getElementById('result-inner')

const flowerName = document.getElementById('flower-name')
const confLine = document.getElementById('confidence-line')

const mainBar = document.getElementById('main-bar')
const allPreds = document.getElementById('all-predictions')

let model = null

function getCertaintyClass(score){

if(score >= THRESHOLD_SURE) return 'cert-sure'
if(score >= THRESHOLD_UNCERTAIN) return 'cert-uncertain'
return 'cert-very-uncertain'

}

async function loadModel(){

model = await tf.loadLayersModel(MODEL_PATH)

const dummy = tf.zeros([1, IMG_SIZE, IMG_SIZE, 3])
model.predict(dummy).dispose()
dummy.dispose()

}

dropArea.addEventListener('dragover', e=>{
e.preventDefault()
})

dropArea.addEventListener('drop', e=>{
e.preventDefault()

const file = e.dataTransfer.files[0]

if(file && file.type.startsWith('image/')){
processFile(file)
}

})

fileInput.addEventListener('change', ()=>{

if(fileInput.files[0]){
processFile(fileInput.files[0])
}

})

function processFile(file){

previewImg.onload = null

const reader = new FileReader()

reader.onload = e=>{

previewImg.onload = ()=> classify(previewImg)

previewImg.src = e.target.result
previewImg.style.display = 'block'

}

reader.readAsDataURL(file)

}

async function classify(img){

if(!model) return

resultCard.classList.remove('visible')
mainBar.style.width = '0%'

allPreds.innerHTML = ''

const tensor = tf.tidy(()=>{

return tf.browser.fromPixels(img)
.resizeBilinear([IMG_SIZE, IMG_SIZE])
.toFloat()
.div(255)
.expandDims(0)

})

let preds

try{

preds = await model.predict(tensor).data()

} finally{

tensor.dispose()

}

const scores = Array.from(preds)

const topIdx = scores.indexOf(Math.max(...scores))
const topScore = scores[topIdx]
const topName = CLASS_NAMES[topIdx]

flowerName.textContent = topName
confLine.textContent = `Sannolikhet: ${(topScore*100).toFixed(1)}%`

requestAnimationFrame(()=>{

setTimeout(()=>{
mainBar.style.width = (topScore*100).toFixed(1)+'%'
},40)

})

const sorted = scores
.map((s,i)=>({name:CLASS_NAMES[i],score:s}))
.sort((a,b)=>b.score-a.score)

sorted.forEach((item,rank)=>{

const row = document.createElement('div')

row.className = 'pred-row'

row.innerHTML = `
<span>${item.name}</span>
<div class="pred-track">
<div class="pred-bar" style="width:0%"></div>
</div>
<span>${(item.score*100).toFixed(1)}%</span>
`

allPreds.appendChild(row)

setTimeout(()=>{

row.querySelector('.pred-bar').style.width =
(item.score*100).toFixed(1)+'%'

},80 + rank*50)

})

resultCard.classList.add('visible')

}

loadModel()

</script>

</body>
</html>
